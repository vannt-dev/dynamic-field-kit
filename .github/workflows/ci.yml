name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint & Format
        run: npm run lint && npm run format-check

      - name: Build packages
        run: |
          npm run build --workspace=@dynamic-field-kit/core
          npm run build --workspace=@dynamic-field-kit/react
          npm run build --workspace=@dynamic-field-kit/vue

      - name: Show bundle sizes
        run: node scripts/show-sizes.js

  test-core:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run core tests
        run: npm run test --workspace=@dynamic-field-kit/core

  test-react:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run React tests with coverage
        run: npm run test --workspace=@dynamic-field-kit/react -- --coverage
        working-directory: packages/react

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: success()
        with:
          files: packages/react/coverage/lcov.info
          flags: unittests
          name: react
          fail_ci_if_error: false

  verify:
    runs-on: ubuntu-latest
    needs: [lint-and-build, test-core, test-react]
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run verification scripts
        run: |
          node scripts/verify-framework-deps.js
          node scripts/check-cross-framework-imports.js
          node scripts/integration-cross-registry.js
